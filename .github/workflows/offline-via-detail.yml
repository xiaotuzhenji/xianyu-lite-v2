name: 详情页真实下架

on:
  workflow_dispatch:

jobs:
  offline:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 详情页下架
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 8m
          script: |
            cd /home/ubuntu/xianyu-lite-v2
            docker compose exec -T backend python - <<'PY'
            import asyncio
            import json
            import time
            from pathlib import Path

            from sqlalchemy import select
            from playwright.async_api import async_playwright

            from app.database import async_session_maker
            from app.models.account import Account
            from app.utils.crypto import trans_cookies

            ITEM_ID = "1061124723485"
            ACCOUNT_ID = "2209036305258"

            async def click_text(page, labels, timeout=2000):
                for label in labels:
                    selectors = [
                        f'button:has-text("{label}")',
                        f'[role="button"]:has-text("{label}")',
                        f'a:has-text("{label}")',
                        f'span:has-text("{label}")',
                        f'text="{label}"',
                    ]
                    for selector in selectors:
                        try:
                            locator = page.locator(selector).first
                            if await locator.count() == 0:
                                continue
                            if not await locator.is_visible(timeout=500):
                                continue
                            await locator.click(timeout=timeout)
                            print("CLICKED", label, selector)
                            return True
                        except Exception:
                            continue
                return False

            async def main():
                async with async_session_maker() as session:
                    account = (await session.execute(select(Account).where(Account.account_id == ACCOUNT_ID))).scalar_one()
                    cookies_str = account.cookie

                cookies = trans_cookies(cookies_str)
                cookie_payloads = []
                for name, value in cookies.items():
                    for domain in [".goofish.com", ".taobao.com", ".alipay.com"]:
                        cookie_payloads.append({"name": name, "value": value, "domain": domain, "path": "/"})

                async with async_playwright() as p:
                    browser = await p.chromium.launch(
                        headless=True,
                        args=[
                            "--no-sandbox",
                            "--disable-setuid-sandbox",
                            "--disable-dev-shm-usage",
                            "--disable-blink-features=AutomationControlled",
                        ],
                    )
                    context = await browser.new_context(
                        viewport={"width": 1365, "height": 900},
                        user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36",
                    )
                    stealth = Path("/app/app/services/stealth.js")
                    if stealth.exists():
                        await context.add_init_script(path=str(stealth))
                    await context.add_cookies(cookie_payloads)
                    page = await context.new_page()
                    urls = [
                        f"https://www.goofish.com/item?spm=a21ybx.personal.feeds.1.64256ac2z71MIE&id={ITEM_ID}&categoryId=50025461",
                        f"https://www.goofish.com/item?id={ITEM_ID}",
                    ]
                    success = False
                    for url in urls:
                        print("GOTO", url)
                        await page.goto(url, wait_until="domcontentloaded", timeout=60000)
                        await page.wait_for_timeout(5000)
                        try:
                            text = await page.evaluate("() => document.body.innerText")
                        except Exception:
                            text = ""
                        print("URL", page.url)
                        print("TEXT", (text or "")[:1000].replace("\n", " | "))
                        if any(word in text for word in ["已下架", "商品已下架", "宝贝已下架"]):
                            success = True
                            break
                        await click_text(page, ["更多", "操作", "菜单", "..."], timeout=2000)
                        await page.wait_for_timeout(1000)
                        clicked = await click_text(page, ["下架", "立即下架", "确认下架"], timeout=3000)
                        if not clicked:
                            print("NO_OFFLINE_BUTTON")
                            continue
                        await page.wait_for_timeout(1500)
                        await click_text(page, ["确认", "确定", "确认下架", "继续下架", "我知道了"], timeout=3000)
                        for _ in range(8):
                            await page.wait_for_timeout(1000)
                            try:
                                text = await page.evaluate("() => document.body.innerText")
                            except Exception:
                                text = ""
                            if any(word in text for word in ["已下架", "下架成功", "商品已下架", "下架完成", "宝贝已下架"]):
                                success = True
                                break
                        if success:
                            break
                    print("DETAIL_OFFLINE_SUCCESS", success)
                    await browser.close()
                    if not success:
                        raise SystemExit(1)

            asyncio.run(main())
            PY
